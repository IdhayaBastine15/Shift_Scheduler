version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shift_scheduler_db
    environment:
      POSTGRES_DB: shift_scheduler
      POSTGRES_USER: scheduler_user
      POSTGRES_PASSWORD: scheduler_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler_user -d shift_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: shift_scheduler_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shift_scheduler
      SPRING_DATASOURCE_USERNAME: scheduler_user
      SPRING_DATASOURCE_PASSWORD: scheduler_pass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
