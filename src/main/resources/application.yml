spring:
  application:
    name: shift-scheduler

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shift_scheduler}
    username: ${SPRING_DATASOURCE_USERNAME:scheduler_user}
    password: ${SPRING_DATASOURCE_PASSWORD:scheduler_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.shiftscheduler: INFO
    org.flywaydb: INFO
